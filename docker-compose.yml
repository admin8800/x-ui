services:
  xui:
    image: admin8800/x-ui
    container_name: x-ui
    hostname: hostname
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
    tty: true
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
